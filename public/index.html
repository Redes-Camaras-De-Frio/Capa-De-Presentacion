<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MonitoreoCF</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">❄️ MonitoreoCF</span>
      <div class="navbar-nav me-auto">
        <a class="nav-link active" href="index.html">Panel</a>
        <a class="nav-link d-none" href="usuarios.html" id="nav-usuarios">Usuarios</a>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light small" id="usuario-info"></span>
        <button class="btn btn-outline-light btn-sm" id="btn-logout">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Panel de monitoreo</h1>
      <span class="text-muted small" id="ultima-actualizacion"></span>
    </div>

    <!-- Filtros: una sola fila, aplican a todo lo de abajo -->
    <div class="row g-2 mb-4">
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted mb-1" for="filtro-sede">Sede</label>
        <select class="form-select form-select-sm" id="filtro-sede">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted mb-1" for="filtro-camara">Cámara</label>
        <select class="form-select form-select-sm" id="filtro-camara">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted mb-1" for="filtro-tipo">Tipo de alerta</label>
        <select class="form-select form-select-sm" id="filtro-tipo">
          <option value="">Todos</option>
          <option value="temp_alta">Temperatura alta</option>
          <option value="temp_baja">Temperatura baja</option>
          <option value="humedad_alta">Humedad alta</option>
          <option value="apertura">Apertura de puerta</option>
          <option value="movimiento">Movimiento</option>
          <option value="agua">Agua / fuga</option>
          <option value="humo">Humo</option>
          <option value="sin_senal">Sin señal</option>
        </select>
      </div>
    </div>

    <!-- KPIs -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <div class="fs-2 fw-bold" id="kpi-sedes">—</div>
            <div class="text-muted small">Sedes</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <div class="fs-2 fw-bold" id="kpi-camaras">—</div>
            <div class="text-muted small">Cámaras de frío</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <div class="fs-2 fw-bold" id="kpi-sensores">—</div>
            <div class="text-muted small">Sensores</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center h-100">
          <div class="card-body">
            <div class="fs-2 fw-bold" id="kpi-alertas">—</div>
            <div class="text-muted small">Alertas últimas 24 h</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Gráfico de temperatura -->
    <div class="card mb-4">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <strong id="chart-titulo">Temperatura — histórico reciente</strong>
        <span class="text-muted small" id="chart-subtitulo"></span>
      </div>
      <div class="card-body position-relative" id="chart-wrap">
        <svg id="chart" width="100%" height="260" role="img" aria-label="Histórico de temperatura"></svg>
        <div id="chart-tooltip" class="viz-tooltip d-none"></div>
        <div class="text-center text-muted small py-5 d-none" id="chart-vacio">Sin lecturas para esta cámara</div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Últimas lecturas por cámara -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header bg-white">
            <strong>Última temperatura por cámara</strong>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Cámara</th>
                  <th class="text-end">Temperatura</th>
                  <th>Rango permitido</th>
                  <th>Registrado</th>
                </tr>
              </thead>
              <tbody id="tabla-lecturas">
                <tr><td colspan="4" class="text-center text-muted py-4">Cargando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Historial de alertas -->
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <strong>Historial de alertas</strong>
            <span class="text-muted small" id="alertas-total"></span>
          </div>
          <div class="table-responsive" style="max-height: 420px; overflow-y: auto;">
            <table class="table align-middle mb-0">
              <tbody id="tabla-alertas">
                <tr><td class="text-center text-muted py-4">Cargando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
