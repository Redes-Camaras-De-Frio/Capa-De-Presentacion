<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — MonitoreoCF</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

  <div class="container" style="max-width: 420px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h1 class="h4 mb-1">❄️ MonitoreoCF</h1>
          <p class="text-muted small mb-0">Sistema de Monitoreo de Cadena de Frío</p>
        </div>

        <div id="error" class="alert alert-danger d-none" role="alert"></div>

        <form id="form-login">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" required autocomplete="username">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100" id="btn-login">Ingresar</button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">Farmacia Central — Sala de Monitoreo</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
